services:

  ### ----------------------- MySQL ----------------------- ###
  imdb-clone-mysql:
    container_name: imdb-clone-mysql
    image: mysql:9.7.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=movie_db
      - MYSQL_ROOT_PASSWORD=supersecret
      - MYSQL_USER=myroot
      - MYSQL_PASSWORD=secret
    ports:
      - "3306:3306"
    volumes:
      - imdb-clone-mysql-data:/var/lib/mysql
    networks:
      - imdb-clone-network

  imdb-clone-elasticsearch:
    container_name: imdb-clone-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.4
    restart: unless-stopped
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - imdb-clone-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - imdb-clone-network

  ### ----------------------- RustFS ----------------------- ###
  imdb-clone-rustfs:
    container_name: imdb-clone-rustfs
    image: rustfs/rustfs:1.0.0-beta.2
    restart: unless-stopped
    user: root
    environment:
      - RUSTFS_ACCESS_KEY=ROOTNAME
      - RUSTFS_SECRET_KEY=CHANGEME123
      - RUSTFS_CONSOLE_ENABLE=true
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - imdb-clone-rustfs-data:/data
    networks:
      - imdb-clone-network
    command: /data

volumes:
  imdb-clone-mysql-data:
    name: imdb-clone-mysql-data
  imdb-clone-elasticsearch-data:
    name: imdb-clone-elasticsearch-data
  imdb-clone-rustfs-data:
    name: imdb-clone-rustfs-data

networks:
  imdb-clone-network:
    name: imdb-clone-network
    driver: bridge
