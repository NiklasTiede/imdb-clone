services:

  ### ----------------------- MySQL ----------------------- ###
  imdb-clone-mysql:
    container_name: imdb-clone-mysql
    image: mysql:8.3.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=movie_db
      - MYSQL_ROOT_PASSWORD=supersecret
      - MYSQL_USER=myroot
      - MYSQL_PASSWORD=secret
    ports:
      - "3306:3306"
    volumes:
      - ./src/main/resources/sql:/docker-entrypoint-initdb.d
    networks:
      - imdb-clone-network

  imdb-clone-elasticsearch:
    container_name: imdb-clone-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.4
    restart: unless-stopped
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - imdb-clone-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - imdb-clone-network

  ### ----------------------- MinIO ----------------------- ###
  imdb-clone-minio:
    container_name: imdb-clone-minio
    image: minio/minio:RELEASE.2024-03-26T22-10-45Z
    restart: unless-stopped
    user: root
    environment:
      - MINIO_ROOT_USER=ROOTNAME
      - MINIO_ROOT_PASSWORD=CHANGEME123
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - imdb-clone-minio-data:/data
    networks:
      - imdb-clone-network
    command: server --console-address :9090 /data

volumes:
  imdb-clone-elasticsearch-data:
    name: imdb-clone-elasticsearch-data
  imdb-clone-minio-data:
    name: imdb-clone-minio-data

networks:
  imdb-clone-network:
    name: imdb-clone-network
    driver: bridge
