version: '3.8'
services:

  ### ----------------------- MySQL ----------------------- ###
  imdb-clone-mysql:
    container_name: imdb-clone-mysql
    image: niklastiede/movie-db:latest
    restart: always
    environment:
      - MYSQL_DATABASE=movie_db
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD_ENV_VAR}
      - MYSQL_USER=${MYSQL_USERNAME_ENV_VAR}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD_ENV_VAR}
    ports:
      - "3306:3306"
    volumes:
      - imdb-clone-mysql-data:/var/lib/mysql
    networks:
      - imdb-clone-network
    command: --secure-file-priv=tmp

  ### ----------------------- RustFS ----------------------- ###
  imdb-clone-rustfs:
    container_name: imdb-clone-rustfs
    image: rustfs/rustfs:1.0.0-beta.2
    restart: always
    environment:
      - RUSTFS_ACCESS_KEY=${OBJECT_STORAGE_ACCESS_KEY_ENV_VAR}
      - RUSTFS_SECRET_KEY=${OBJECT_STORAGE_SECRET_KEY_ENV_VAR}
      - RUSTFS_CONSOLE_ENABLE=true
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - imdb-clone-rustfs-data:/data
    networks:
      - imdb-clone-network
    command: /data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rustfs.rule=Host(`rustfs.imdb-clone.the-coding-lab.com`)"
      - "traefik.http.routers.rustfs.entrypoints=websecure"
      - "traefik.http.routers.rustfs.tls.certresolver=myresolver"

  load-object-storage-data:
    container_name: load-object-storage-data
    image: niklastiede/custom-rustfs-mc:latest
    depends_on:
      - imdb-clone-rustfs
    environment:
      - OBJECT_STORAGE_ACCESS_KEY=${OBJECT_STORAGE_ACCESS_KEY_ENV_VAR}
      - OBJECT_STORAGE_SECRET_KEY=${OBJECT_STORAGE_SECRET_KEY_ENV_VAR}
    networks:
      - imdb-clone-network
    entrypoint: >
      /bin/sh -c '
      cd /tmp/ &&
      wget https://www.dropbox.com/s/hz4tv7j20jprldr/compressed_movie_images.tar.gz &&
      tar -xzf ./compressed_movie_images.tar.gz &&
      mv processed_movie_images movies &&
      rm -rf ./compressed_movie_images.tar.gz &&
      mc alias set rustfs http://imdb-clone-rustfs:9000 $${OBJECT_STORAGE_ACCESS_KEY} $${OBJECT_STORAGE_SECRET_KEY} &&
      (mc ls rustfs | grep "imdb-clone") || mc mb rustfs/imdb-clone &&
      mc cp --recursive /tmp/movies rustfs/imdb-clone &&
      rm -rf /tmp/movies'

  ### ----------------------- ElasticSearch ----------------------- ###
  imdb-clone-elasticsearch:
    container_name: imdb-clone-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.4
    restart: always
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms4096m -Xmx4096m
#      - ELASTIC_USERNAME=${ELASTIC_USERNAME_ENV_VAR}
#      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD_ENV_VAR}
    ports:
      - "9200:9200"
    volumes:
      - imdb-clone-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - imdb-clone-network

volumes:
  imdb-clone-mysql-data:
    name: imdb-clone-mysql-data
  imdb-clone-elasticsearch-data:
    name: imdb-clone-elasticsearch-data
  imdb-clone-rustfs-data:
    name: imdb-clone-rustfs-data

networks:
  imdb-clone-network:
    name: imdb-clone-network
    driver: bridge
