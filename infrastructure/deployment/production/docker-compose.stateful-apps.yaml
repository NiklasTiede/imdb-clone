version: '3.8'
services:

  ### ----------------------- PostgreSQL ----------------------- ###
  imdb-clone-postgresql:
    container_name: imdb-clone-postgresql
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_DB=movie_db
      - POSTGRES_USER=${POSTGRESQL_USERNAME_ENV_VAR}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD_ENV_VAR}
    ports:
      - "5432:5432"
    volumes:
      - imdb-clone-postgresql-data:/var/lib/postgresql
    networks:
      - imdb-clone-network

  ### ----------------------- RustFS ----------------------- ###
  imdb-clone-rustfs:
    container_name: imdb-clone-rustfs
    image: rustfs/rustfs:1.0.0-beta.2
    restart: always
    environment:
      - RUSTFS_ACCESS_KEY=${OBJECT_STORAGE_ACCESS_KEY_ENV_VAR}
      - RUSTFS_SECRET_KEY=${OBJECT_STORAGE_SECRET_KEY_ENV_VAR}
      - RUSTFS_CONSOLE_ENABLE=true
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - imdb-clone-rustfs-data:/data
    networks:
      - imdb-clone-network
    command: /data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rustfs.rule=Host(`rustfs.imdb-clone.the-coding-lab.com`)"
      - "traefik.http.routers.rustfs.entrypoints=websecure"
      - "traefik.http.routers.rustfs.tls.certresolver=myresolver"

  imdb-clone-seed-full:
    image: ${IMDB_CLONE_SEED_FULL_IMAGE}
    profiles:
      - seed-full
    depends_on:
      - imdb-clone-postgresql
      - imdb-clone-rustfs
    environment:
      - POSTGRES_HOST=imdb-clone-postgresql
      - POSTGRES_DB=movie_db
      - POSTGRES_USER=${POSTGRESQL_USERNAME_ENV_VAR}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD_ENV_VAR}
      - RUSTFS_ENDPOINT=http://imdb-clone-rustfs:9000
      - RUSTFS_ACCESS_KEY=${OBJECT_STORAGE_ACCESS_KEY_ENV_VAR}
      - RUSTFS_SECRET_KEY=${OBJECT_STORAGE_SECRET_KEY_ENV_VAR}
      - RUSTFS_BUCKET=imdb-clone
      - SEED_NAME=full
      - SEED_VERSION=${SEED_VERSION_ENV_VAR}
    networks:
      - imdb-clone-network

  ### ----------------------- ElasticSearch ----------------------- ###
  imdb-clone-elasticsearch:
    container_name: imdb-clone-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.4
    restart: always
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms4096m -Xmx4096m
#      - ELASTIC_USERNAME=${ELASTIC_USERNAME_ENV_VAR}
#      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD_ENV_VAR}
    ports:
      - "9200:9200"
    volumes:
      - imdb-clone-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - imdb-clone-network

volumes:
  imdb-clone-postgresql-data:
    name: imdb-clone-postgresql-data
  imdb-clone-elasticsearch-data:
    name: imdb-clone-elasticsearch-data
  imdb-clone-rustfs-data:
    name: imdb-clone-rustfs-data

networks:
  imdb-clone-network:
    name: imdb-clone-network
    driver: bridge
