apiVersion: apps/v1
kind: Deployment
metadata:
  name: imdb-clone-backend
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: imdb-clone-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imdb-clone-backend
    spec:
      containers:
        - name: backend
          image: niklastiede/imdb-clone-backend:v1.0.1@sha256:331adf0dc5e4d3cc91119f2d0a4a3211e829a2a434f9116544a249a0e97c1848
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://imdb-clone-postgresql.databases.svc.cluster.local:5432/movie_db
            - name: OPENSEARCH_URIS
              value: http://imdb-clone-opensearch.databases.svc.cluster.local:9200
            - name: IMDB_CLONE_MEDIA_STORAGE_URI
              value: http://imdb-clone-rustfs.databases.svc.cluster.local:9000
            - name: IMDB_CLONE_CATALOG_SEARCH_EMBEDDING_BASE_URL
              value: http://imdb-clone-llama-cpp.databases.svc.cluster.local:8080
            - name: SPRING_APPLICATION_JSON
              value: |-
                {
                  "management": {
                    "metrics": {
                      "distribution": {
                        "percentiles-histogram": {
                          "http.server.requests": true
                        }
                      }
                    }
                  }
                }
          envFrom:
            - secretRef:
                name: backend-runtime
          readinessProbe:
            tcpSocket:
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: management
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: imdb-clone-backend
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: imdb-clone-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: imdb-clone-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: management
      port: 8081
      targetPort: management
