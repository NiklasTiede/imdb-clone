apiVersion: apps/v1
kind: Deployment
metadata:
  name: imdb-clone-backend
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: imdb-clone-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imdb-clone-backend
    spec:
      containers:
        - name: backend
          image: niklastiede/imdb-clone-backend:latest@sha256:fbf8a97ee8b8617e0746a4fc1b6d8fc4ec94bfddaef733966a4b6f92d0e2b620
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          envFrom:
            - secretRef:
                name: backend-runtime
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: imdb-clone-backend
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: imdb-clone-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: management
      port: 8081
      targetPort: management
