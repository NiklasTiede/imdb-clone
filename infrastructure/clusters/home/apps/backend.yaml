apiVersion: apps/v1
kind: Deployment
metadata:
  name: imdb-clone-backend
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: imdb-clone-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imdb-clone-backend
    spec:
      containers:
        - name: backend
          image: niklastiede/imdb-clone-backend:v0.2.5@sha256:f505de25ba41f9867410b5fb326001e6bfdc4cf3af3b7e3070d3a495917dd22b
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://imdb-clone-postgresql.databases.svc.cluster.local:5432/movie_db
            - name: SPRING_ELASTICSEARCH_URIS
              value: http://imdb-clone-elasticsearch.databases.svc.cluster.local:9200
            - name: IMDB_CLONE_MEDIA_STORAGE_URI
              value: http://imdb-clone-rustfs.databases.svc.cluster.local:9000
          envFrom:
            - secretRef:
                name: backend-runtime
          readinessProbe:
            tcpSocket:
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: management
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: imdb-clone-backend
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: imdb-clone-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: management
      port: 8081
      targetPort: management
