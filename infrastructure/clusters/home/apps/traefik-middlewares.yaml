apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: imdb-clone-public-rate-limit
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  rateLimit:
    average: 50
    period: 1s
    burst: 100
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: imdb-clone-security-headers
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  headers:
    contentTypeNosniff: true
    forceSTSHeader: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    referrerPolicy: no-referrer
    permissionsPolicy: publickey-credentials-get=(self)
    contentSecurityPolicy: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://object-storage.imdb-clone.the-coding-lab.com; font-src 'self' data:; connect-src 'self' https://imdb-clone.the-coding-lab.com https://backend.imdb-clone.the-coding-lab.com;"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: imdb-clone-public-rate-limit
  namespace: databases
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  rateLimit:
    average: 50
    period: 1s
    burst: 100
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: imdb-clone-security-headers
  namespace: databases
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  headers:
    contentTypeNosniff: true
    forceSTSHeader: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    referrerPolicy: no-referrer
