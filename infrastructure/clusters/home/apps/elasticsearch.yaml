apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: imdb-clone-elasticsearch
  namespace: databases
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  version: 9.3.4
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  nodeSets:
    - name: default
      count: 1
      config:
        node.store.allow_mmap: false
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms512m -Xmx512m"
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 1Gi
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: local-path
            resources:
              requests:
                storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: imdb-clone-elasticsearch
  namespace: databases
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ClusterIP
  selector:
    elasticsearch.k8s.elastic.co/cluster-name: imdb-clone-elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
