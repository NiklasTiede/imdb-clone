apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-lan-only
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  ipAllowList:
    sourceRange:
      - 127.0.0.1/32
      - ::1/128
      - 192.168.178.0/24
      - 95.214.148.244/32
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  insecureSkipVerify: true
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    traefik.ingress.kubernetes.io/service.serverstransport: argocd-argocd-server@kubernetescrd
    traefik.ingress.kubernetes.io/service.serversscheme: https
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
    - name: https
      port: 443
      protocol: TCP
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-internal
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: argocd-argocd-lan-only@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.imdb-clone.the-coding-lab.com
      secretName: argocd-internal-tls
  rules:
    - host: argocd.imdb-clone.the-coding-lab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: https
