apiVersion: apps/v1
kind: Deployment
metadata:
  name: imdb-clone-frontend
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: imdb-clone-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imdb-clone-frontend
    spec:
      containers:
        - name: frontend
          image: niklastiede/imdb-clone-frontend:v0.2.5@sha256:e72b1485eeb009ad983c443f96d9cacefb95ebee0d3e91148e57fbeaec00acb3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: imdb-clone-frontend
  namespace: imdb-clone
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: imdb-clone-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
