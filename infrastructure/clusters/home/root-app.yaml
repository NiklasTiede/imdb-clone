apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NiklasTiede/imdb-clone
    targetRevision: master
    path: infrastructure/clusters/home/apps
    plugin:
      name: sops-kustomize
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
