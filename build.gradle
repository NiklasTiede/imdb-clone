plugins {
	id 'java'
	id 'idea'
	id 'org.springframework.boot' version "${springBootPluginVersion}"
	id 'jacoco'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.github.ben-manes.versions' version '0.54.0'
	id 'com.diffplug.spotless' version '8.4.0'
}

group = 'com.thecodinglab'
version = '1.0.0'

compileJava.dependsOn 'spotlessApply'


idea {
	project {
		languageLevel = JavaVersion.VERSION_21
	}
	module {
		jdkName = JavaVersion.VERSION_21
	}
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencyManagement {
	imports {
		mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
	}
}

spotless {
	java {
		target 'src/main/java/**/*.java', 'src/test/java/**/*.java'
		targetExclude 'build/**', 'frontend/**'
		targetExclude 'src/main/java/**/payload/*.java', 'src/main/java/**/payload/**/*.java'
		importOrder()
		removeUnusedImports()
		trimTrailingWhitespace()
//		googleJavaFormat()
		toggleOffOn()
	}
}

dependencies {
	//-- Improved developing
	implementation "org.springframework.boot:spring-boot-devtools:${springBootVersion}"

	//-- Servlet
	implementation "org.springframework.boot:spring-boot-starter-web:${springBootVersion}"
	implementation "org.springframework.boot:spring-boot-starter-webflux:${springBootVersion}"

	//-- Validation
	implementation "org.springframework.boot:spring-boot-starter-validation:${springBootVersion}"

	//-- Documentation - Swagger UI
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'

	//-- create persistence containers with startup
	implementation "org.springframework.boot:spring-boot-docker-compose:${springBootVersion}"

	//-- Mapping
	implementation 'org.mapstruct:mapstruct:1.7.0.Beta1'
	annotationProcessor 'org.mapstruct:mapstruct-processor:1.7.0.Beta1'

	//-- Rel. Database
	implementation 'com.mysql:mysql-connector-j:9.7.0'
	implementation "org.springframework.boot:spring-boot-starter-data-jpa:${springBootVersion}"

	//-- SearchEngine
	implementation "org.springframework.boot:spring-boot-starter-data-elasticsearch:${springBootVersion}"
	implementation 'org.eclipse.parsson:parsson:1.1.7' // fix transitive vulnerability

	//-- File Storage
	implementation 'io.minio:minio:8.5.11'

	//-- Email
	implementation "org.springframework.boot:spring-boot-starter-mail:${springBootVersion}"
	implementation "org.springframework.boot:spring-boot-starter-thymeleaf:${springBootVersion}"

	//-- Security: JWT / OAuth2
	implementation "io.jsonwebtoken:jjwt-api:${jwtVersion}"
	runtimeOnly "io.jsonwebtoken:jjwt-impl:${jwtVersion}"
	runtimeOnly "io.jsonwebtoken:jjwt-jackson:${jwtVersion}"

	implementation "org.springframework.security:spring-security-core:${springVersion}"
	implementation "org.springframework.security:spring-security-web:${springVersion}"
	implementation "org.springframework.security:spring-security-config:${springVersion}"

	//-- Monitoring
	implementation "org.springframework.boot:spring-boot-starter-actuator:${springBootVersion}"
	implementation 'io.micrometer:micrometer-registry-prometheus'

	//-- Logging
	implementation "org.springframework.boot:spring-boot-starter-logging:${springBootVersion}"
	implementation 'net.logstash.logback:logstash-logback-encoder:9.0'

	//-- Testing
	testImplementation "org.springframework.boot:spring-boot-starter-test:${springBootVersion}"
	testImplementation 'org.assertj:assertj-core:3.26.3'

	testImplementation "org.testcontainers:testcontainers:${testContainersVersion}"
	testImplementation "org.testcontainers:junit-jupiter:${testContainersVersion}"
	testImplementation "org.testcontainers:mysql:${testContainersVersion}"
	testImplementation "org.testcontainers:elasticsearch:${testContainersVersion}"
	testImplementation "org.testcontainers:minio:${testContainersVersion}"

	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	if (System.getProperty('os.name').toLowerCase().contains('mac')) {
		runtimeOnly 'io.netty:netty-resolver-dns-native-macos:4.2.12.Final:osx-aarch_64'
	}
}

test {
	useJUnitPlatform()
}

jacoco {
	toolVersion = "0.8.11"
}

jacocoTestReport {
	dependsOn test
	reports {
		xml.required = true
	}
}
