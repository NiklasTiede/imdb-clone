openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/watched-movie/{movieId}/watch:
    put:
      tags:
      - watched-movie-controller
      operationId: watchMovie
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/WatchedMovieRecord"
  /api/movie/{movieId}:
    get:
      tags:
      - movie-controller
      operationId: getMovieById
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MovieRecord"
    put:
      tags:
      - movie-controller
      operationId: updateMovie
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MovieRecord"
    delete:
      tags:
      - movie-controller
      operationId: deleteMovie
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/movie-rating/{movieId}/rating-score/{score}:
    put:
      tags:
      - rating-controller
      operationId: rateMovie
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: score
        in: path
        required: true
        schema:
          type: number
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RatingRecord"
  /api/comment/{commentId}:
    get:
      tags:
      - comment-controller
      operationId: getCommentById
      parameters:
      - name: commentId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
