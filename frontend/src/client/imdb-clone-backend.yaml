              schema:
                $ref: "#/components/schemas/AccountCreated"
  /api/movie/search/{primaryTitle}:
    get:
      tags:
      - movie-controller
      operationId: searchMoviesByTitle
      parameters:
      - name: primaryTitle
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 30
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseMovieRecord"
      deprecated: true
  /api/comment/{movieId}/comments:
    get:
      tags:
      - comment-controller
      operationId: getCommentsByMovieId
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 30
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseCommentRecord"
  /api/auth/reset-password:
    get:
      tags:
      - authentication-controller
      operationId: resetPassword
      parameters:
      - name: email
        in: query
        required: true
        schema:
          type: string
          format: email
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/auth/confirm-email-address:
    get:
      tags:
      - authentication-controller
      operationId: confirmEmailAddress
      parameters:
      - name: token
        in: query
        required: true
        schema:
          type: string
      responses:
