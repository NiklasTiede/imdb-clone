      tags:
      - file-storage-controller
      operationId: storeUserProfilePhoto
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
              required:
              - image
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  type: string
    delete:
      tags:
      - file-storage-controller
      operationId: deleteUserProfilePhoto
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/file-storage/movie/{movieId}:
    post:
      tags:
      - file-storage-controller
      operationId: storeMovieImage
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
              required:
              - image
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  type: string
    delete:
      tags:
      - file-storage-controller
      operationId: deleteMovieImage
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/comment/{movieId}:
    post:
      tags:
      - comment-controller
      operationId: createComment
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CommentRecord"
  /api/auth/save-new-password:
    post:
      tags:
      - authentication-controller
      operationId: saveNewPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
        required: true
      responses:
        "200":
          description: OK
