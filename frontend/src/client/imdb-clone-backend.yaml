  /api/search/movies:
    post:
      tags:
      - search-controller
      operationId: search
      parameters:
      - name: query
        in: query
        required: true
        schema:
          type: string
          maxLength: 200
          minLength: 0
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 30
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieSearchRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseMovieRecord"
  /api/search/movies/reindex:
