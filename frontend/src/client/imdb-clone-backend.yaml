      operationId: getCurrentAccount
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AccountSummaryResponse"
  /api/account/me/profile:
    get:
      tags:
      - account-controller
      operationId: getCurrentAccountProfile
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AccountProfile"
  /api/watched-movie/{movieId}:
    delete:
      tags:
      - watched-movie-controller
      operationId: deleteWatchedMovie
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/movie-rating/{movieId}:
    delete:
      tags:
      - rating-controller
      operationId: deleteRating
      parameters:
      - name: movieId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
components:
  schemas:
    MovieRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        imdbId:
          type: string
        tmdbId:
          type: integer
          format: int64
        movieType:
          type: string
          enum:
          - SHORT
          - MOVIE
          - VIDEO
          - TV_MOVIE
          - TV_EPISODE
          - TV_MINI_SERIES
          - TV_SPECIAL
          - TV_SERIES
          - TV_SHORT
          - TV_PILOT
          - VIDEO_GAME
        primaryTitle:
          type: string
        originalTitle:
          type: string
        adult:
          type: boolean
        startYear:
          type: integer
          format: int32
        endYear:
          type: integer
          format: int32
        runtimeMinutes:
          type: integer
          format: int32
        modifiedAtInUtc:
          type: string
          format: date-time
        createdAtInUtc:
          type: string
          format: date-time
        movieGenre:
          type: array
          items:
            type: string
            enum:
            - HORROR
            - MYSTERY
            - THRILLER
            - CRIME
            - WESTERN
            - WAR
            - ACTION
            - ADVENTURE
            - FAMILY
            - COMEDY
            - ANIMATION
            - FANTASY
            - SCI_FI
            - DRAMA
            - ROMANCE
            - SPORT
            - HISTORY
            - BIOGRAPHY
            - MUSIC
            - MUSICAL
            - DOCUMENTARY
            - NEWS
            - ADULT
            - REALITY_TV
            - TALK_SHOW
            - GAME_SHOW
            - FILM_NOIR
            - SHORT
          uniqueItems: true
        imdbRating:
          type: number
          format: float
        imdbRatingCount:
          type: integer
          format: int32
        description:
          type: string
        posterImageToken:
          type: string
        backdropImageToken:
          type: string
        trailerYoutubeKey:
          type: string
        rating:
          type: number
          format: float
        ratingCount:
          type: integer
          format: int32
    WatchedMovieRecord:
      type: object
      properties:
        accountId:
          type: integer
          format: int64
        movieId:
          type: integer
          format: int64
        addedAt:
          type: string
          format: date-time
        movie:
          $ref: "#/components/schemas/MovieRecord"
    MovieRequest:
      type: object
      properties:
        imdbId:
          type: string
          pattern: "^tt\\d{7,}$"
        tmdbId:
          type: integer
          format: int64
        movieType:
          type: string
          enum:
          - SHORT
          - MOVIE
          - VIDEO
          - TV_MOVIE
          - TV_EPISODE
          - TV_MINI_SERIES
          - TV_SPECIAL
          - TV_SERIES
          - TV_SHORT
          - TV_PILOT
          - VIDEO_GAME
        primaryTitle:
          type: string
          maxLength: 200
          minLength: 0
        originalTitle:
          type: string
          maxLength: 200
          minLength: 0
        adult:
          type: boolean
        startYear:
          type: integer
          format: int32
          maximum: 2030
          minimum: 1850
        endYear:
          type: integer
          format: int32
          maximum: 2030
          minimum: 1850
        runtimeMinutes:
          type: integer
          format: int32
        movieGenre:
          type: array
          items:
            type: string
            enum:
            - HORROR
            - MYSTERY
            - THRILLER
            - CRIME
            - WESTERN
            - WAR
            - ACTION
            - ADVENTURE
            - FAMILY
            - COMEDY
            - ANIMATION
            - FANTASY
            - SCI_FI
            - DRAMA
            - ROMANCE
            - SPORT
            - HISTORY
            - BIOGRAPHY
            - MUSIC
            - MUSICAL
            - DOCUMENTARY
            - NEWS
            - ADULT
            - REALITY_TV
            - TALK_SHOW
            - GAME_SHOW
            - FILM_NOIR
            - SHORT
          uniqueItems: true
        description:
          type: string
          maxLength: 5000
          minLength: 0
        posterImageToken:
          type: string
          maxLength: 255
          minLength: 0
        backdropImageToken:
          type: string
          maxLength: 255
          minLength: 0
        trailerYoutubeKey:
          type: string
          maxLength: 255
          minLength: 0
      required:
      - originalTitle
    RatingRecord:
      type: object
      properties:
        rating:
          type: number
        accountId:
          type: integer
          format: int64
        movieId:
          type: integer
          format: int64
    UpdateCommentRequest:
      type: object
      properties:
        message:
          type: string
          maxLength: 1000
          minLength: 0
    CommentRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        message:
          type: string
        accountId:
          type: integer
          format: int64
        movieId:
          type: integer
          format: int64
        createdAtInUtc:
          type: string
          format: date-time
    AccountRecord:
      type: object
      properties:
        username:
          type: string
          maxLength: 50
          minLength: 2
        password:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          maxLength: 35
          minLength: 2
        lastName:
          type: string
          maxLength: 35
          minLength: 2
        phone:
          type: string
        bio:
          type: string
        birthday:
          type: string
          format: date
    UpdatedAccountProfile:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        bio:
          type: string
        birthday:
          type: string
          format: date
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    MovieSearchRequest:
      type: object
      properties:
        minStartYear:
          type: integer
          format: int32
          maximum: 2030
          minimum: 1850
        maxStartYear:
          type: integer
          format: int32
          maximum: 2030
          minimum: 1850
        minRuntimeMinutes:
          type: integer
          format: int32
          minimum: 0
        maxRuntimeMinutes:
          type: integer
          format: int32
          maximum: 5000
        movieGenre:
          type: array
          items:
            type: string
            enum:
            - HORROR
            - MYSTERY
            - THRILLER
            - CRIME
            - WESTERN
            - WAR
            - ACTION
            - ADVENTURE
            - FAMILY
            - COMEDY
            - ANIMATION
            - FANTASY
            - SCI_FI
            - DRAMA
            - ROMANCE
            - SPORT
            - HISTORY
            - BIOGRAPHY
            - MUSIC
            - MUSICAL
            - DOCUMENTARY
            - NEWS
            - ADULT
            - REALITY_TV
            - TALK_SHOW
            - GAME_SHOW
            - FILM_NOIR
            - SHORT
          uniqueItems: true
        movieType:
          type: string
          enum:
          - SHORT
