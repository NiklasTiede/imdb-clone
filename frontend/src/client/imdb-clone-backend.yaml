  /api/auth/check-username-availability:
    get:
      tags:
      - authentication-controller
      operationId: checkUsernameAvailability
      parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserIdentityAvailability"
  /api/auth/check-email-availability:
    get:
      tags:
      - authentication-controller
      operationId: checkEmailAvailability
      parameters:
      - name: email
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserIdentityAvailability"
  /api/account/{username}/watchlist:
    get:
      tags:
      - account-engagement-controller
      operationId: getWatchedMoviesByAccount
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 30
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseWatchedMovieRecord"
  /api/account/{username}/ratings:
    get:
      tags:
      - account-engagement-controller
      operationId: getRatingsByAccount
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 30
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseRatingRecord"
  /api/account/{username}/profile:
    get:
      tags:
      - account-controller
      operationId: getAccountProfile
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PublicAccountProfile"
  /api/account/{username}/comments:
    get:
      tags:
      - account-engagement-controller
      operationId: getCommentsByAccount
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 30
      responses:
