# Production secrets may be injected through Docker environment variables
# or mounted under /run/secrets with names matching the placeholders below.

### ------------ General Config -----------------------
spring.config.import=optional:configtree:/run/secrets/
imdb-clone.identity.backend-host=${backend_address}
imdb-clone.identity.frontend-host=${frontend_address}


### ------------ Database Config ----------------------
spring.datasource.url=jdbc:postgresql://imdb-clone-postgresql:5432/movie_db
spring.datasource.username=${postgresql_username}
spring.datasource.password=${postgresql_password}


### ------------ Documentation Config -----------------
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true


### ------------ Email Config -------------------------
imdb-clone.identity.email-verification-enabled=false
imdb-clone.notification.email.sender=${mail_username}
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.username=${mail_username}
spring.mail.password=${mail_password}


### ------------ OpenSearch Config -----------------
opensearch.uris=http://imdb-clone-opensearch.databases.svc.cluster.local:9200
opensearch.username=${opensearch_username:}
opensearch.password=${opensearch_password:}


### ------------ Object Storage Config ----------------
imdb-clone.media.storage.uri=http://imdb-clone-rustfs:9000
imdb-clone.media.storage.access-key=${object_storage_access_key}
imdb-clone.media.storage.secret-key=${object_storage_secret_key}
imdb-clone.media.storage.bucket-name=imdb-clone


### ------------ Security Config ---------------------
server.servlet.session.cookie.secure=true
