# Production secrets may be injected through Docker environment variables
# or mounted under /run/secrets with names matching the placeholders below.

### ------------ General Config -----------------------
spring.config.import=optional:configtree:/run/secrets/
imdb-clone.identity.backend-host=${backend_address}
imdb-clone.identity.frontend-host=${frontend_address}


### ------------ Database Config ----------------------
spring.datasource.url=jdbc:mysql://imdb-clone-mysql:3306/movie_db?serverTimezone=UTC
spring.datasource.username=${mysql_username}
spring.datasource.password=${mysql_password}


### ------------ Documentation Config -----------------
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false


### ------------ Email Config -------------------------
imdb-clone.identity.email-verification-enabled=false
imdb-clone.notification.email.sender=${mail_username}
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.username=${mail_username}
spring.mail.password=${mail_password}


### ------------ Elasticsearch Config -----------------
spring.elasticsearch.uris=http://imdb-clone-elasticsearch:9200
spring.elasticsearch.username=${elasticsearch_username}
spring.elasticsearch.password=${elasticsearch_password}


### ------------ Object Storage Config ----------------
imdb-clone.media.storage.uri=http://imdb-clone-minio:9000
imdb-clone.media.storage.access-key=${minio_access_key}
imdb-clone.media.storage.secret-key=${minio_secret_key}
imdb-clone.media.storage.bucket-name=imdb-clone


### ------------ Security Config (JWT, CORS) ----------
imdb-clone.identity.jwt.secret=${jwt_secret_prod}
# Token expires in 30 days
imdb-clone.identity.jwt.expiration-in-ms=2592000000
imdb-clone.identity.cors.allowed-origins=${frontend_address}
