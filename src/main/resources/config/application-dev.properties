### ------------ General Config -----------------------
imdb-clone.identity.backend-host=http://localhost:8080
imdb-clone.identity.frontend-host=http://localhost:3000


### ------------ Database Config ----------------------
spring.datasource.url=jdbc:mysql://localhost:3306/movie_db?serverTimezone=UTC
spring.datasource.username=myroot
spring.datasource.password=secret

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1


### ------------ Documentation Config -----------------
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true


### ------------ Email Config -------------------------
imdb-clone.identity.email-verification-enabled=false
imdb-clone.notification.email.sender=placeholder
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.username=placeholder
spring.mail.password=placeholder@email.com


### ------------ Monitoring Config --------------------
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


### ------------ Elasticsearch Config -----------------
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=elastic
spring.elasticsearch.password=password


### ------------ Minio Config -------------------------
imdb-clone.media.storage.uri=http://localhost:9000
imdb-clone.media.storage.access-key=ROOTNAME
imdb-clone.media.storage.secret-key=CHANGEME123
imdb-clone.media.storage.bucket-name=imdb-clone


