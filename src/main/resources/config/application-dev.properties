### ------------ General Config -----------------------
imdb-clone.identity.backend-host=http://localhost:8080
imdb-clone.identity.frontend-host=http://localhost:3000


### ------------ Database Config ----------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_db
spring.datasource.username=myroot
spring.datasource.password=secret


### ------------ Documentation Config -----------------
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true


### ------------ Email Config -------------------------
imdb-clone.identity.email-verification-enabled=false
imdb-clone.notification.email.sender=placeholder
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.username=placeholder
spring.mail.password=placeholder@email.com


### ------------ Monitoring Config --------------------
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


### ------------ OpenSearch Config -----------------
opensearch.uris=http://localhost:9200
opensearch.username=
opensearch.password=


### ------------ Embeddings Config --------------------
imdb-clone.catalog.search.embedding.base-url=http://localhost:8082
imdb-clone.catalog.search.embedding.model=embeddinggemma


### ------------ Object Storage Config ----------------
imdb-clone.media.storage.uri=http://localhost:9000
imdb-clone.media.storage.access-key=ROOTNAME
imdb-clone.media.storage.secret-key=CHANGEME123
imdb-clone.media.storage.bucket-name=imdb-clone


### ------------ Security Config ---------------------
server.servlet.session.cookie.secure=false
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:dev-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:dev-github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
