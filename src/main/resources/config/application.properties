### ------------ General Config -----------------------
server.port=8080
spring.profiles.default=dev

spring.threads.virtual.enabled=true
spring.mvc.problemdetails.enabled=true
spring.modulith.detection-strategy=explicitly-annotated


### ------------ Database Config ----------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=false


### ------------ Serialization/Deserialization ----------------------
spring.jackson.default-property-inclusion=always


### ------------ Scheduled Job Config - Thread Pool ---
spring.task.scheduling.pool.size=5
db-scheduler.enabled=true
db-scheduler.table-name=scheduled_tasks
db-scheduler.always-persist-timestamp-in-utc=true
db-scheduler.polling-interval=10s
db-scheduler.threads=5
db-scheduler.polling-strategy=lock-and-fetch


### ------------ Email Config -------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.starttls.enable=true


### ------------ Monitoring Config (Prometheus) -------
management.server.port=8081
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=db
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.springframework.web=INFO


### ------------ Elasticsearch Config -----------------
management.health.elasticsearch.enabled=true


### ------------ Documentation Config -----------------
## generate openapi-spec: http://localhost:8080/v3/api-docs.yaml
springdoc.api-docs.path=/v3/api-docs
## generate openapi-spec: http://localhost:8080/v3/swagger-ui.html
springdoc.swagger-ui.path=/v3/swagger-ui.html


### ------------ REST Clients -------------------------
imdb-clone.recommendation.open-trivia.base-url=https://opentdb.com
